<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SNAKE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #030a03;
      --panel: #060f06;
      --grid: #0a1a0a;
      --green: #00ff41;
      --green-dim: #00aa2a;
      --green-glow: #00ff4180;
      --red: #ff2244;
      --amber: #ffaa00;
      --text: #00ff41;
      --border: #1a3a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
    }

    .title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: var(--green);
      text-shadow:
        0 0 8px var(--green),
        0 0 20px var(--green-glow),
        0 0 40px var(--green-glow);
      animation: flicker 6s infinite;
    }

    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
      99% { opacity: 1; }
    }

    .hud {
      display: flex;
      gap: 40px;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .hud-label {
      color: var(--green-dim);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
    }

    .hud-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 10px var(--green-glow);
      min-width: 60px;
      text-align: center;
    }

    .canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px #0a200a,
        0 0 20px rgba(0,255,65,0.1),
        inset 0 0 30px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
      background: var(--panel);
    }

    /* Overlay for start/game-over */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3,10,3,0.85);
      gap: 16px;
      transition: opacity 0.3s;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 900;
      letter-spacing: 0.25em;
      text-align: center;
      color: var(--green);
      text-shadow: 0 0 16px var(--green);
    }

    .overlay-title.dead { color: var(--red); text-shadow: 0 0 16px var(--red); }

    .overlay-sub {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--green-dim);
      text-align: center;
      padding: 0 20px;
    }

    .btn {
      margin-top: 8px;
      padding: 10px 32px;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      cursor: pointer;
      text-shadow: 0 0 8px var(--green);
      box-shadow: 0 0 10px rgba(0,255,65,0.2), inset 0 0 10px rgba(0,255,65,0.05);
      transition: all 0.15s;
    }

    .btn:hover {
      background: rgba(0,255,65,0.1);
      box-shadow: 0 0 20px rgba(0,255,65,0.4), inset 0 0 15px rgba(0,255,65,0.1);
    }

    .controls {
      display: flex;
      gap: 12px;
      font-size: 0.65rem;
      color: var(--green-dim);
      letter-spacing: 0.12em;
    }

    .controls span { display: flex; align-items: center; gap: 5px; }

    .key {
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid var(--border);
      background: #0a180a;
      border-radius: 3px;
      font-size: 0.7rem;
      color: var(--green);
    }

    /* Mobile D-pad */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }

    .dpad-row { display: flex; gap: 4px; }

    .dpad-btn {
      width: 48px;
      height: 48px;
      background: #0a1a0a;
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active { background: rgba(0,255,65,0.15); }

    @media (max-width: 600px) {
      .dpad { display: flex; }
      .controls { display: none; }
    }

    .score-pop {
      position: absolute;
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      color: var(--amber);
      text-shadow: 0 0 8px var(--amber);
      pointer-events: none;
      animation: pop 0.7s ease-out forwards;
    }

    @keyframes pop {
      0%   { opacity: 1; transform: translateY(0) scale(1.2); }
      100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
    }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="title">SNAKE</div>
  </header>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">BEST</span>
      <span class="hud-value" id="best">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level">1</span>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="game"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title" id="overlayTitle">SNAKE</div>
      <div class="overlay-sub" id="overlaySub">Navigate the grid. Eat to grow.<br>Don't bite yourself.</div>
      <button class="btn" id="startBtn">▶ START</button>
    </div>
  </div>

  <div class="controls">
    <span><span class="key">↑ W</span> UP</span>
    <span><span class="key">↓ S</span> DOWN</span>
    <span><span class="key">← A</span> LEFT</span>
    <span><span class="key">→ D</span> RIGHT</span>
    <span><span class="key">P</span> PAUSE</span>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn" id="dUp">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" id="dLeft">◀</div>
      <div class="dpad-btn" id="dDown">▼</div>
      <div class="dpad-btn" id="dRight">▶</div>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const canvasWrap = document.getElementById('canvasWrap');

  const COLS = 25, ROWS = 25;
  let CELL;

  function resize() {
    const vw = Math.min(window.innerWidth - 32, 520);
    const vh = Math.min(window.innerHeight - 260, 520);
    const size = Math.floor(Math.min(vw, vh) / COLS) * COLS;
    CELL = size / COLS;
    canvas.width = size;
    canvas.height = size;
  }
  resize();
  window.addEventListener('resize', () => { resize(); if (!running) drawIdle(); });

  // Colors
  const C = {
    bg: '#060f06',
    grid: '#0a1a0a',
    snake: '#00ff41',
    snakeDark: '#008a22',
    snakeHead: '#7fff00',
    food: '#ff2244',
    foodGlow: 'rgba(255,34,68,0.6)',
    bonus: '#ffaa00',
    bonusGlow: 'rgba(255,170,0,0.6)',
    text: '#00ff41',
  };

  let snake, dir, nextDir, food, bonus, score, best, level, speed, running, paused, frame, bonusTimer, bonusActive;

  best = parseInt(localStorage.getItem('snakeBest') || '0');
  bestEl.textContent = best;

  function initGame() {
    const mid = Math.floor(COLS / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    speed = 130;
    bonus = null;
    bonusTimer = 0;
    bonusActive = false;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    placeFood();
  }

  function placeFood() {
    food = randomFreeCell();
    // Occasionally spawn bonus
    if (!bonusActive && Math.random() < 0.3) {
      bonusActive = true;
      bonusTimer = 120; // frames
      bonus = randomFreeCell();
    }
  }

  function randomFreeCell() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (
      snake.some(s => s.x === pos.x && s.y === pos.y) ||
      (food && pos.x === food.x && pos.y === food.y)
    );
    return pos;
  }

  function gameLoop() {
    if (!running || paused) return;
    update();
    draw();
    frame = setTimeout(gameLoop, speed);
  }

  function update() {
    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

    snake.unshift(head);

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      scoreEl.textContent = score;
      updateLevel();
      popScore('+' + (10 * level), head);
      placeFood();
      ate = true;
    } else if (bonusActive && bonus && head.x === bonus.x && head.y === bonus.y) {
      score += 50 * level;
      scoreEl.textContent = score;
      updateLevel();
      popScore('+' + (50 * level) + '★', head);
      bonus = null;
      bonusActive = false;
      ate = true;
    }

    if (!ate) snake.pop();

    // Bonus timer
    if (bonusActive && bonus) {
      bonusTimer--;
      if (bonusTimer <= 0) { bonus = null; bonusActive = false; }
    }

    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      bestEl.textContent = best;
    }
  }

  function updateLevel() {
    const newLevel = Math.floor(score / 100) + 1;
    if (newLevel !== level) {
      level = newLevel;
      levelEl.textContent = level;
      speed = Math.max(55, 130 - (level - 1) * 10);
    }
  }

  function draw() {
    // Background
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // Food (pulsing)
    const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 200);
    drawGlowRect(food.x, food.y, C.food, C.foodGlow, pulse);

    // Bonus
    if (bonusActive && bonus) {
      const bp = 0.7 + 0.3 * Math.sin(Date.now() / 150);
      drawGlowRect(bonus.x, bonus.y, C.bonus, C.bonusGlow, bp);
      // Flicker when about to expire
      if (bonusTimer < 30 && Math.floor(Date.now() / 100) % 2 === 0) {
        // skip draw for flicker effect
      } else {
        // star symbol
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${CELL * 0.6}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('★', bonus.x * CELL + CELL / 2, bonus.y * CELL + CELL / 2);
      }
    }

    // Snake body
    for (let i = snake.length - 1; i >= 1; i--) {
      const s = snake[i];
      const t = 1 - i / snake.length;
      const pad = CELL * 0.12;
      ctx.fillStyle = i % 2 === 0 ? C.snake : C.snakeDark;
      ctx.shadowColor = C.snake;
      ctx.shadowBlur = 4;
      roundRect(s.x * CELL + pad, s.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 3);
      ctx.fill();
    }

    // Snake head
    const h = snake[0];
    const pad = CELL * 0.06;
    ctx.fillStyle = C.snakeHead;
    ctx.shadowColor = C.snake;
    ctx.shadowBlur = 16;
    roundRect(h.x * CELL + pad, h.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
    ctx.fill();

    // Eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#030a03';
    const eyeSize = CELL * 0.12;
    const ex = dir.x, ey = dir.y;
    // Perpendicular
    const px = ey, py = -ex;
    const cx = h.x * CELL + CELL / 2 + ex * CELL * 0.2;
    const cy = h.y * CELL + CELL / 2 + ey * CELL * 0.2;
    ctx.beginPath(); ctx.arc(cx + px * CELL * 0.2, cy + py * CELL * 0.2, eyeSize, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx - px * CELL * 0.2, cy - py * CELL * 0.2, eyeSize, 0, Math.PI * 2); ctx.fill();

    ctx.shadowBlur = 0;
  }

  function drawGlowRect(gx, gy, color, glow, scale) {
    const pad = CELL * (1 - scale) / 2;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 18;
    ctx.fillStyle = color;
    roundRect(gx * CELL + pad, gy * CELL + pad, CELL - pad * 2, CELL - pad * 2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawIdle() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }
  }

  function popScore(text, cell) {
    const el = document.createElement('div');
    el.className = 'score-pop';
    el.textContent = text;
    const rect = canvasWrap.getBoundingClientRect();
    el.style.left = (cell.x * CELL + CELL / 2) + 'px';
    el.style.top = (cell.y * CELL) + 'px';
    canvasWrap.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function startGame() {
    overlay.classList.add('hidden');
    initGame();
    running = true;
    paused = false;
    clearTimeout(frame);
    gameLoop();
  }

  function endGame() {
    running = false;
    clearTimeout(frame);
    overlayTitle.textContent = 'GAME OVER';
    overlayTitle.className = 'overlay-title dead';
    overlaySub.innerHTML = `SCORE: <strong>${score}</strong> &nbsp;|&nbsp; BEST: <strong>${best}</strong>`;
    startBtn.textContent = '▶ RETRY';
    overlay.classList.remove('hidden');
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (!paused) gameLoop();
  }

  startBtn.addEventListener('click', startGame);

  // Keyboard
  const keyMap = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') { togglePause(); return; }
    const d = keyMap[e.key];
    if (d) {
      e.preventDefault();
      if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    }
  });

  // D-pad
  function dpadDir(d) {
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
  }
  document.getElementById('dUp').addEventListener('click', () => dpadDir({ x: 0, y: -1 }));
  document.getElementById('dDown').addEventListener('click', () => dpadDir({ x: 0, y: 1 }));
  document.getElementById('dLeft').addEventListener('click', () => dpadDir({ x: -1, y: 0 }));
  document.getElementById('dRight').addEventListener('click', () => dpadDir({ x: 1, y: 0 }));

  // Swipe support
  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) {
      dpadDir(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
    } else {
      dpadDir(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
    }
    touchStart = null;
  }, { passive: true });

  drawIdle();
</script>
</body>
</html>
